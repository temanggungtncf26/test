<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#3b82f6">
  <title>Rainfall Monitor</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #111827; }
    /* Iframe Styling */
    iframe { width: 100vw; height: 100vh; border: none; margin: 0; padding: 0; display: block; }
    
    /* Offline Fallback Styling */
    #offline-fallback {
      display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #111827; color: #ffffff; flex-direction: column; 
      justify-content: center; align-items: center; text-align: center;
      font-family: system-ui, -apple-system, sans-serif; padding: 20px; box-sizing: border-box;
      z-index: 9999;
    }
    #offline-fallback h2 { margin-bottom: 8px; font-size: 24px; font-weight: bold; }
    #offline-fallback p { font-size: 16px; opacity: 0.8; max-width: 400px; margin-bottom: 24px; line-height: 1.5; }
    #offline-fallback button {
      padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; font-weight: 600;
      border-radius: 8px; background: #3b82f6; color: #fff; transition: opacity 0.2s;
    }
    #offline-fallback button:hover { opacity: 0.9; }
    #offline-fallback svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.9; fill: #3b82f6; }
  </style>
</head>
<body>
  
  <!-- Offline Fallback UI -->
  <div id="offline-fallback">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" opacity="0.2"/>
      <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h2>Koneksi Terputus</h2>
    <p>Aplikasi ini mengambil data langsung dari Google Apps Script dan memerlukan koneksi internet aktif.</p>
    <button onclick="window.location.reload()">Coba Muat Ulang</button>
  </div>

  <!-- The GAS Iframe -->
  <iframe id="gas-frame" src="https://script.google.com/macros/s/AKfycbzJL-N5UcevIHBK5Yp_ahJ2asnCQaQQ18BiT97KjcCFEhefcuQBpm8MWkNIsejoyNsvog/exec" allow="camera; microphone; geolocation; clipboard-write; clipboard-read"></iframe>

  <script>
    // 1. Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker Registered!', reg.scope))
          .catch(err => console.error('Service Worker Registration Failed!', err));
      });
    }

    // 2. Online/Offline Detection for App Shell
    function updateOnlineStatus() {
      const iframe = document.getElementById('gas-frame');
      const offlineMsg = document.getElementById('offline-fallback');
      
      if (navigator.onLine) {
        iframe.style.display = 'block';
        offlineMsg.style.display = 'none';
      } else {
        iframe.style.display = 'none';
        offlineMsg.style.display = 'flex';
      }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    
    // Initial check
    updateOnlineStatus();
  </script>
</body>
</html>
